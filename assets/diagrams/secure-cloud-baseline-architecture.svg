<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 850" role="img" aria-labelledby="title desc">
  <title id="title">Secure Cloud Baseline Architecture</title>
  <desc id="desc">Flat technical reference diagram. A user reaches an AWS account containing a VPC with a public subnet (DNS / Route 53, WAF, Application Load Balancer), a private application subnet (private app service and security group), and a private data subnet (RDS database and KMS encryption). Security and monitoring controls and backup recovery controls sit inside the AWS account alongside the VPC.</desc>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#6b7280"/>
    </marker>
    <style>
      text{font-family:Arial,Helvetica,sans-serif;fill:#1f2937}
      .canvas{fill:#ffffff;stroke:#d1d5db;stroke-width:1.5}
      .boundary{fill:#ffffff;stroke:#9ca3af;stroke-width:1.5}
      .section{fill:#f8fafc;stroke:#cbd5e1;stroke-width:1.2}
      .component{fill:#eef6ff;stroke:#8bb5e8;stroke-width:1.4}
      .security{fill:#ecfdf5;stroke:#86c7a6;stroke-width:1.4}
      .source{fill:#fff7ed;stroke:#f0b36a;stroke-width:1.4}
      .backup{fill:#fff7ed;stroke:#f0b36a;stroke-width:1.4}
      .title-text{font-size:25px;font-weight:700}
      .section-text{font-size:15px;font-weight:700;fill:#2563eb}
      .label{font-size:15px;font-weight:600}
      .small{font-size:13.5px;font-weight:600}
      .line{fill:none;stroke:#6b7280;stroke-width:1.6;marker-end:url(#arrow)}
      .control-line{fill:none;stroke:#6b7280;stroke-width:1.4;stroke-dasharray:6 5;marker-end:url(#arrow)}
    </style>
  </defs>

  <rect class="canvas" x="20" y="20" width="1460" height="810" rx="6"/>
  <text class="title-text" x="48" y="60">Secure Cloud Baseline Architecture</text>

  <!-- User (outside AWS Account) -->
  <rect class="source" x="60" y="330" width="110" height="52" rx="4"/>
  <text class="label" x="115" y="361" text-anchor="middle">User</text>

  <!-- AWS Account boundary -->
  <rect class="boundary" x="190" y="110" width="1280" height="700" rx="6"/>
  <text class="section-text" x="210" y="140">AWS Account</text>

  <!-- VPC boundary -->
  <rect class="boundary" x="230" y="175" width="850" height="440" rx="6"/>
  <text class="section-text" x="250" y="202">VPC</text>

  <!-- Public Subnet section -->
  <rect class="section" x="260" y="225" width="260" height="370" rx="6"/>
  <text class="section-text" x="278" y="252">Public Subnet</text>
  <rect class="component" x="285" y="300" width="190" height="56" rx="4"/>
  <text class="label" x="380" y="333" text-anchor="middle">DNS / Route 53</text>
  <rect class="component" x="285" y="390" width="190" height="56" rx="4"/>
  <text class="label" x="380" y="423" text-anchor="middle">WAF</text>
  <rect class="component" x="285" y="480" width="190" height="64" rx="4"/>
  <text class="small" x="380" y="506" text-anchor="middle">Application</text>
  <text class="small" x="380" y="526" text-anchor="middle">Load Balancer</text>

  <!-- Private Application Subnet section -->
  <rect class="section" x="560" y="225" width="230" height="370" rx="6"/>
  <text class="section-text" x="578" y="250">Private Application</text>
  <text class="section-text" x="578" y="270">Subnet</text>
  <rect class="component" x="585" y="390" width="170" height="64" rx="4"/>
  <text class="small" x="670" y="416" text-anchor="middle">Private App</text>
  <text class="small" x="670" y="436" text-anchor="middle">Service</text>
  <rect class="security" x="585" y="490" width="170" height="46" rx="4"/>
  <text class="small" x="670" y="518" text-anchor="middle">Security Group</text>

  <!-- Private Data Subnet section -->
  <rect class="section" x="830" y="225" width="220" height="370" rx="6"/>
  <text class="section-text" x="848" y="252">Private Data Subnet</text>
  <rect class="component" x="855" y="390" width="170" height="64" rx="4"/>
  <text class="small" x="940" y="416" text-anchor="middle">RDS</text>
  <text class="small" x="940" y="436" text-anchor="middle">Database</text>
  <rect class="security" x="855" y="490" width="170" height="46" rx="4"/>
  <text class="small" x="940" y="518" text-anchor="middle">KMS Encryption</text>

  <!-- Security and Monitoring section (inside AWS Account, outside VPC) -->
  <rect class="section" x="1120" y="175" width="310" height="440" rx="6"/>
  <text class="section-text" x="1138" y="202">Security and Monitoring</text>
  <rect class="security" x="1150" y="240" width="250" height="54" rx="4"/>
  <text class="small" x="1275" y="262" text-anchor="middle">IAM Least</text>
  <text class="small" x="1275" y="282" text-anchor="middle">Privilege</text>
  <rect class="security" x="1150" y="312" width="250" height="44" rx="4"/>
  <text class="small" x="1275" y="340" text-anchor="middle">CloudTrail</text>
  <rect class="security" x="1150" y="374" width="250" height="44" rx="4"/>
  <text class="small" x="1275" y="402" text-anchor="middle">GuardDuty</text>
  <rect class="security" x="1150" y="436" width="250" height="54" rx="4"/>
  <text class="small" x="1275" y="458" text-anchor="middle">CloudWatch</text>
  <text class="small" x="1275" y="478" text-anchor="middle">Logs</text>
  <rect class="security" x="1150" y="508" width="250" height="44" rx="4"/>
  <text class="small" x="1275" y="536" text-anchor="middle">AWS Config</text>

  <!-- Backup / Recovery section (inside AWS Account, outside VPC) -->
  <rect class="section" x="420" y="650" width="620" height="135" rx="6"/>
  <text class="section-text" x="440" y="678">Backup / Recovery</text>
  <rect class="backup" x="650" y="708" width="170" height="56" rx="4"/>
  <text class="small" x="735" y="732" text-anchor="middle">S3 Backup</text>
  <text class="small" x="735" y="752" text-anchor="middle">Bucket</text>
  <rect class="backup" x="850" y="708" width="170" height="56" rx="4"/>
  <text class="small" x="935" y="741" text-anchor="middle">Backup Policy</text>

  <!-- Main traffic flow: User -> DNS / Route 53 -> WAF -> ALB -> Private App / Service -> RDS Database -->
  <path class="line" d="M170 356 H255 V328 H285"/>
  <path class="line" d="M380 356 V390"/>
  <path class="line" d="M380 446 V480"/>
  <path class="line" d="M475 512 H530 V422 H585"/>
  <path class="line" d="M755 422 H855"/>

  <!-- Security / control connections (dashed) -->
  <path class="control-line" d="M670 490 V458"/>
  <path class="control-line" d="M940 490 V458"/>
  <path class="control-line" d="M1120 300 H1082"/>
  <path class="control-line" d="M1120 460 H1082"/>

  <!-- Backup connections (dashed) -->
  <path class="control-line" d="M1025 440 H1065 V620 H735 V708"/>
  <path class="control-line" d="M820 736 H850"/>
</svg>
