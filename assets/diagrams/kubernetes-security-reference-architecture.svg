<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">Kubernetes Security Reference Architecture</title>
  <desc id="desc">Flat technical reference diagram showing developer workflow, CI/CD, image scan gate, container registry, EKS cluster guardrails, and observability.</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6b7280"/>
    </marker>
    <style>
      text{font-family:Arial,Helvetica,sans-serif;fill:#1f2937}
      .canvas{fill:#ffffff;stroke:#d1d5db;stroke-width:1.5}
      .boundary{fill:#ffffff;stroke:#9ca3af;stroke-width:1.5}
      .section{fill:#f9fafb;stroke:#cbd5e1;stroke-width:1.2}
      .component{fill:#eef6ff;stroke:#8bb5e8;stroke-width:1.4}
      .control{fill:#ecfdf5;stroke:#86c7a6;stroke-width:1.4}
      .source{fill:#fff7ed;stroke:#f0b36a;stroke-width:1.4}
      .title-text{font-size:24px;font-weight:700}
      .section-text{font-size:17px;font-weight:700;fill:#2563eb}
      .label{font-size:16px;font-weight:600}
      .small{font-size:14px;font-weight:600}
      .line{fill:none;stroke:#6b7280;stroke-width:1.6;marker-end:url(#arrow)}
      .control-line{fill:none;stroke:#6b7280;stroke-width:1.4;stroke-dasharray:6 6;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="canvas" x="20" y="20" width="1360" height="780" rx="6"/>
  <text class="title-text" x="48" y="58">Kubernetes Security Reference Architecture</text>
  <rect class="boundary" x="48" y="88" width="1304" height="684" rx="6"/>
  <text class="section-text" x="72" y="120">AWS Account / EKS Environment</text>

  <rect class="section" x="78" y="154" width="700" height="210" rx="6"/>
  <text class="section-text" x="100" y="186">Developer Workflow</text>
  <rect class="source" x="118" y="244" width="140" height="52" rx="4"/>
  <text class="label" x="188" y="276" text-anchor="middle">Developer</text>
  <rect class="component" x="318" y="236" width="170" height="68" rx="4"/>
  <text class="small" x="403" y="262" text-anchor="middle">GitHub</text>
  <text class="small" x="403" y="282" text-anchor="middle">Repository</text>
  <rect class="component" x="548" y="236" width="170" height="68" rx="4"/>
  <text class="small" x="633" y="262" text-anchor="middle">CI/CD</text>
  <text class="small" x="633" y="282" text-anchor="middle">Pipeline</text>
  <rect class="control" x="548" y="306" width="170" height="44" rx="4"/>
  <text class="small" x="633" y="334" text-anchor="middle">Image Scan Gate</text>
  <path class="line" d="M258 270 H318"/>
  <path class="line" d="M488 270 H548"/>
  <path class="line" d="M633 304 V306"/>

  <rect class="section" x="836" y="154" width="260" height="210" rx="6"/>
  <text class="section-text" x="858" y="186">Container Registry</text>
  <rect class="component" x="890" y="244" width="160" height="66" rx="4"/>
  <text class="small" x="970" y="270" text-anchor="middle">ECR / Container</text>
  <text class="small" x="970" y="290" text-anchor="middle">Registry</text>
  <path class="line" d="M718 328 H890"/>

  <rect class="section" x="78" y="424" width="850" height="258" rx="6"/>
  <text class="section-text" x="100" y="456">Kubernetes Cluster</text>
  <rect class="component" x="124" y="506" width="160" height="58" rx="4"/>
  <text class="small" x="204" y="530" text-anchor="middle">EKS Control</text>
  <text class="small" x="204" y="550" text-anchor="middle">Plane</text>
  <rect class="component" x="346" y="506" width="150" height="58" rx="4"/>
  <text class="small" x="421" y="530" text-anchor="middle">Worker</text>
  <text class="small" x="421" y="550" text-anchor="middle">Nodes</text>
  <rect class="component" x="560" y="506" width="160" height="58" rx="4"/>
  <text class="small" x="640" y="540" text-anchor="middle">EKS Deployment</text>
  <path class="line" d="M970 310 V535 H720"/>
  <path class="line" d="M560 535 H496"/>
  <path class="line" d="M346 535 H284"/>

  <rect class="control" x="126" y="610" width="150" height="44" rx="4"/>
  <text class="small" x="201" y="638" text-anchor="middle">Namespace</text>
  <rect class="control" x="356" y="610" width="150" height="44" rx="4"/>
  <text class="small" x="431" y="638" text-anchor="middle">RBAC</text>
  <rect class="control" x="586" y="610" width="150" height="44" rx="4"/>
  <text class="small" x="661" y="638" text-anchor="middle">NetworkPolicy</text>
  <rect class="control" x="748" y="506" width="150" height="58" rx="4"/>
  <text class="small" x="823" y="530" text-anchor="middle">Secrets</text>
  <text class="small" x="823" y="550" text-anchor="middle">Management</text>
  <path class="control-line" d="M201 610 V564"/>
  <path class="control-line" d="M431 610 V564"/>
  <path class="control-line" d="M661 610 V564"/>
  <path class="control-line" d="M748 535 H720"/>

  <rect class="section" x="988" y="424" width="280" height="258" rx="6"/>
  <text class="section-text" x="1010" y="456">Observability</text>
  <rect class="control" x="1040" y="506" width="180" height="48" rx="4"/>
  <text class="small" x="1130" y="536" text-anchor="middle">Audit Logs</text>
  <rect class="control" x="1040" y="592" width="180" height="58" rx="4"/>
  <text class="small" x="1130" y="616" text-anchor="middle">CloudWatch /</text>
  <text class="small" x="1130" y="636" text-anchor="middle">Monitoring</text>
  <path class="control-line" d="M898 535 H1040"/>
  <path class="control-line" d="M898 535 H960 V621 H1040"/>
</svg>
